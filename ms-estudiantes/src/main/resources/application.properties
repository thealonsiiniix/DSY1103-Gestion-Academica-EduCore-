spring.application.name=ms-estudiantes
# Puerto donde correraˇ este microservicio
server.port=8081
# Configuracion de base de datos H2 en memoria
spring.datasource.url=jdbc:h2:file:./data/db-estudiantes
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
# Desactivamos la creacion automatica de tablas con Hibernate
# porque queremos usar migraciones con Flyway
spring.jpa.hibernate.ddl-auto=none
# Permite abrir la consola web de H2
spring.h2.console.enabled=true
# Activa Flyway para ejecutar scripts SQL al iniciar
spring.flyway.enabled=true
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/api-docs